; Docker::API builds images during dzil build and tags/releases them.
; Build: after_build builds from build_root, tags with build_tag, loads into daemon.
; Release: release() tags existing build image with release_tag, optionally pushes.

; Config:
;   image = registry/image-name (required)
;   build_tag = latest (default) - tags for dzil build
;   release_tag = %v (default) - tags for dzil release
;   release_enabled = 1 (default) - enable/disable release() entirely
;   release_push = 1 (default) - push during release
;   build_load = 1 (default) - load built image into daemon

[@Author::GETTY]
confirm_release = 1